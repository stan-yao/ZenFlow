const lightenHex = (hex, t=0.45) => {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>Math.round(v+(255-v)*t).toString(16).padStart(2,'0')).join('');
};

const T = {

};

// ── Date utils ────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,"0");
const toISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseISO = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (s,n) => { const d=parseISO(s); d.setDate(d.getDate()+n); return toISO(d); };
const diffDays = (a,b) => Math.round((parseISO(b)-parseISO(a))/86400000);
const todayISO = () => toISO(new Date());
const uid = () => Math.random().toString(36).slice(2,10);

// 用 Canvas 量實際文字寬度
let _mctx = null;
const measureText = text => {
  if (!_mctx) _mctx = document.createElement("canvas").getContext("2d");
  _mctx.font = "600 11px Inter, system-ui, sans-serif";
  return _mctx.measureText(text).width;
};

// ── Canvas Export ─────────────────────────────────────────────────────────────
function rrect(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
function exportJPG({sorted,allCats,minD,dayWidth,projectName,dark}){
  const SIDE=184,DW=Math.max(dayWidth,18),RH=44,HH=72,BAR_H=26;
  const tk=dark?T.dark:T.light;
  const totalD=sorted.length?diffDays(minD,sorted.reduce((m,t)=>t.end>m?t.end:m,sorted[0].end))+8:40;
  const W=SIDE+totalD*DW+16,H=HH+sorted.length*RH+32;
  const cv=document.createElement("canvas");cv.width=W*2;cv.height=H*2;
  const ctx=cv.getContext("2d");ctx.scale(2,2);
  ctx.fillStyle=tk.bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=tk.text;ctx.font="bold 16px -apple-system,sans-serif";ctx.fillText(projectName,14,26);
  ctx.fillStyle=tk.textDim;ctx.font="10px 'Courier New',monospace";ctx.fillText("匯出日期："+todayISO(),14,42);
  ctx.fillStyle=tk.border;ctx.fillRect(SIDE,0,1,H);
  ctx.fillStyle=tk.surface;ctx.fillRect(0,HH-30,W,30);
  ctx.fillStyle=tk.border;ctx.fillRect(0,HH-30,W,1);ctx.fillRect(0,HH,W,1);
  let mx=SIDE,months=[];
  for(let i=0;i<totalD;i++){const d=parseISO(addDays(minD,i));const lbl=`${d.getFullYear()}/${d.getMonth()+1}`;if(!months.length||months[months.length-1].lbl!==lbl)months.push({lbl,x:mx,count:1});else months[months.length-1].count++;mx+=DW;}
  months.forEach(m=>{ctx.fillStyle=tk.border;ctx.fillRect(m.x,HH-30,1,30);ctx.fillStyle=tk.text;ctx.font="bold 10px -apple-system,sans-serif";ctx.fillText(m.lbl,m.x+5,HH-18);});
  for(let i=0;i<totalD;i++){const d=parseISO(addDays(minD,i));const x=SIDE+i*DW;const we=d.getDay()===0||d.getDay()===6;const isTd=addDays(minD,i)===todayISO();if(we){ctx.fillStyle=tk.weekend;ctx.fillRect(x,HH,DW,H-HH);}ctx.fillStyle=isTd?tk.today:(we?tk.textDim:tk.textMid);ctx.font=(isTd?"bold ":"")+"9px 'Courier New',monospace";ctx.textAlign="center";ctx.fillText(d.getDate(),x+DW/2,HH-4);ctx.textAlign="left";}
  const ti=diffDays(minD,todayISO());if(ti>=0&&ti<totalD){ctx.fillStyle=tk.today;ctx.globalAlpha=.6;ctx.fillRect(SIDE+ti*DW+DW/2-.5,HH,1,H-HH);ctx.globalAlpha=1;}
  sorted.forEach((task,idx)=>{
    const y=HH+idx*RH;ctx.fillStyle=tk.border;ctx.fillRect(0,y+RH,W,1);
    ctx.save();ctx.beginPath();ctx.rect(4,y,SIDE-12,RH);ctx.clip();
    const cat=allCats.find(c=>c.key===task.category)||allCats[allCats.length-1];
    ctx.fillStyle=(dark?cat.dark:cat.light)[0];ctx.fillRect(6,y+12,3,20);
    ctx.fillStyle=tk.text;ctx.font="500 12px -apple-system,sans-serif";ctx.fillText(task.name,14,y+RH/2+1);
    ctx.fillStyle=tk.textDim;ctx.font="9px 'Courier New',monospace";ctx.fillText((diffDays(task.start,task.end)+1)+"天",14,y+RH/2+13);ctx.restore();
    const cols=dark?cat.dark:cat.light;const bx=SIDE+diffDays(minD,task.start)*DW;const bw=Math.max((diffDays(task.start,task.end)+1)*DW,6);const by=y+(RH-BAR_H)/2;
    const grad=ctx.createLinearGradient(bx,0,bx+bw,0);grad.addColorStop(0,cols[0]);grad.addColorStop(1,cols[1]);ctx.fillStyle=grad;rrect(ctx,bx,by,bw,BAR_H,BAR_H/2);ctx.fill();
    if(task.progress>0){ctx.fillStyle="rgba(255,255,255,0.25)";rrect(ctx,bx,by,bw*task.progress/100,BAR_H,BAR_H/2);ctx.fill();}
    if(bw>48){ctx.save();ctx.beginPath();ctx.rect(bx+8,by,bw-16,BAR_H);ctx.clip();ctx.fillStyle="rgba(255,255,255,0.92)";ctx.font="bold 10px -apple-system,sans-serif";ctx.shadowColor="rgba(0,0,0,0.2)";ctx.shadowBlur=2;ctx.fillText(task.name,bx+12,by+BAR_H/2+4);ctx.restore();}
  });
  const a=document.createElement("a");a.download=`${projectName}-工期表.jpg`;a.href=cv.toDataURL("image/jpeg",.95);a.click();
}

// ── Main Component ────────────────────────────────────────────────────────────
function GanttPlanner() {
  const [dark,setDark]=useState(false);
  const [ready,setReady]=useState(false);
  const [loading,setLoading]=useState(true);
  const [saveStatus,setSaveStatus]=useState("");
  const [projects,setProjects]=useState({});
  const [activeId,setActiveId]=useState(null);
  const [dayWidth,setDayWidth]=useState(window.innerWidth<640?22:32);
  const [showProjects,setShowProjects]=useState(false);
  const [showCatModal,setShowCatModal]=useState(false);
  const [showForm,setShowForm]=useState(false);
  const [editingTaskId,setEditingTaskId]=useState(null);
  const [confirmId,setConfirmId]=useState(null);
  const [renamingId,setRenamingId]=useState(null);
  const scrollRef=useRef(null);
  const dragRef=useRef(null);
  const saveTimer=useRef(null);
  const tk=dark?T.dark:T.light;

  const proj=projects[activeId]||{name:"未命名專案",tasks:[],customCats:[]};
  const {name:projectName,tasks=[],customCats=[]}=proj;
  const allCats=[...DEFAULT_CATS,...customCats];
  const catOf=k=>allCats.find(c=>c.key===k)||allCats[allCats.length-1];

  // ── 從 Firebase 載入 ──
  useEffect(()=>{
    (async()=>{
      try{
        const [projSnap,confSnap]=await Promise.all([
          db.collection(PROJ_COL).get(),
          CONF_DOC.get()
        ]);
        let projs={};
        projSnap.forEach(doc=>{ projs[doc.id]={id:doc.id,...doc.data()}; });
        if(!Object.keys(projs).length){
          const id=uid();
          projs={[id]:{id,name:"未命名專案",tasks:[],customCats:[],updatedAt:new Date().toISOString()}};
        }
        const conf=confSnap.exists?confSnap.data():{};
        if(conf.dark!==undefined) setDark(conf.dark);
        const aid=(conf.activeId&&projs[conf.activeId])?conf.activeId:Object.keys(projs)[0];
        setProjects(projs); setActiveId(aid);
      }catch(e){
        console.error("Firebase 載入失敗",e);
        const id=uid();
        setProjects({[id]:{id,name:"未命名專案",tasks:[],customCats:[],updatedAt:new Date().toISOString()}});
        setActiveId(id);
      }finally{ setLoading(false); setReady(true); }
    })();
  },[]);

  // ── 儲存目前專案到 Firebase ──
  const activeJson=activeId&&projects[activeId]?JSON.stringify(projects[activeId]):null;
  useEffect(()=>{
    if(!ready||!activeId||!activeJson)return;
    setSaveStatus("儲存中…");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{
        const {id,...data}=JSON.parse(activeJson);
        await db.collection(PROJ_COL).doc(activeId).set(data);
        setSaveStatus("☁ 已同步");
        setTimeout(()=>setSaveStatus(""),2500);
      }catch{ setSaveStatus("⚠ 儲存失敗"); }
    },800);
  },[activeJson,ready]);

  // ── 儲存設定（active 專案 + 深淺色）──
  useEffect(()=>{
    if(!ready||!activeId)return;
    CONF_DOC.set({activeId,dark}).catch(()=>{});
  },[activeId,dark,ready]);

  // helpers
  const updProj=upd=>{if(!activeId)return;setProjects(p=>({...p,[activeId]:{...p[activeId],...upd,updatedAt:new Date().toISOString()}}));};
  const setProjectName=n=>updProj({name:n});
  const setTasks=fn=>updProj({tasks:typeof fn==="function"?fn(tasks):fn});
  const setCustomCats=fn=>updProj({customCats:typeof fn==="function"?fn(customCats):fn});

  const createProject=()=>{
    const id=uid();
    const np={id,name:"新專案",tasks:[],customCats:[],updatedAt:new Date().toISOString()};
    setProjects(p=>({...p,[id]:np}));
    setActiveId(id);
    setTimeout(()=>setRenamingId(id),80);
  };
  const deleteProject=async id=>{
    const keys=Object.keys(projects);if(keys.length<=1)return;
    setProjects(p=>{const n={...p};delete n[id];return n;});
    if(activeId===id)setActiveId(keys.find(k=>k!==id));
    try{ await db.collection(PROJ_COL).doc(id).delete(); }catch{}
  };

  // timeline derived
  const today=todayISO();
  const sorted=[...tasks].sort((a,b)=>a.start===b.start?(a.end<b.end?-1:1):(a.start<b.start?-1:1));
  let minD=today,maxD=addDays(today,30);
  if(tasks.length){minD=tasks.reduce((m,t)=>t.start<m?t.start:m,tasks[0].start);maxD=tasks.reduce((m,t)=>t.end>m?t.end:m,tasks[0].end);}
  minD=addDays(minD,-3);maxD=addDays(maxD,6);
  const totalDays=diffDays(minD,maxD)+1;
  const days=Array.from({length:totalDays},(_,i)=>addDays(minD,i));
  const months=[];
  days.forEach(d=>{const dt=parseISO(d);const lbl=`${dt.getFullYear()}年${dt.getMonth()+1}月`;if(months.length&&months[months.length-1].label===lbl)months[months.length-1].count++;else months.push({label:lbl,count:1});});
  const spanDays=arr=>{if(!arr.length)return 0;const s=arr.reduce((m,t)=>t.start<m?t.start:m,arr[0].start);const e=arr.reduce((m,t)=>t.end>m?t.end:m,arr[0].end);return diffDays(s,e)+1;};
  const desDays=spanDays(tasks.filter(t=>t.category==="design"));
  const bldDays=spanDays(tasks.filter(t=>t.category!=="design"));
  const latestEnd=tasks.length?tasks.reduce((m,t)=>t.end>m?t.end:m,tasks[0].end):null;
  const nextStart=latestEnd?addDays(latestEnd,1):today;
  const ROW_H=44,BAR_H=28,HEAD_H=60,SIDEBAR=156;
  const timelineWidth=totalDays*dayWidth;
  const timelineHeight=HEAD_H+sorted.length*ROW_H+20;
  const todayOff=diffDays(minD,today)*dayWidth;

  useEffect(()=>{if(ready&&scrollRef.current)scrollRef.current.scrollLeft=Math.max(0,todayOff-80);},[ready,activeId]);

  const openNew=()=>{setEditingTaskId("new");setShowForm(true);};
  const openEdit=id=>{setEditingTaskId(id);setShowForm(true);};
  const closeForm=()=>{setShowForm(false);setEditingTaskId(null);};
  const saveTask=task=>{if(editingTaskId==="new")setTasks(t=>[...t,{...task,id:uid()}]);else setTasks(t=>t.map(x=>x.id===editingTaskId?{...x,...task}:x));closeForm();};
  const deleteTask=id=>{setTasks(t=>t.filter(x=>x.id!==id));setConfirmId(null);closeForm();};

  const makeDrag = (task, mode) => e => {
    if (e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    const sx = e.clientX, os = task.start, oe = task.end;
    let last = null, moved = false;
    const mv = me => {
      const d = Math.round((me.clientX - sx) / dayWidth);
      if (d === last) return; last = d; if (d !== 0) moved = true;
      setProjects(p => {
        const proj = p[activeId]; if (!proj) return p;
        const newTasks = (proj.tasks || []).map(x => {
          if (x.id !== task.id) return x;
          if (mode === "move") return {...x, start: addDays(os, d), end: addDays(oe, d)};
          if (mode === "l") { const ns = addDays(os, d); return diffDays(ns, x.end) >= 0 ? {...x, start: ns} : x; }
          if (mode === "r") { const ne = addDays(oe, d); return diffDays(x.start, ne) >= 0 ? {...x, end: ne} : x; }
          return x;
        });
        return {...p, [activeId]: {...proj, tasks: newTasks, updatedAt: new Date().toISOString()}};
      });
    };
    const up = () => {
      document.removeEventListener("mousemove", mv);
      document.removeEventListener("mouseup", up);
      if (!moved && mode === "move") openEdit(task.id);
    };
    document.addEventListener("mousemove", mv);
    document.addEventListener("mouseup", up);
  };

  const projectList=Object.values(projects).sort((a,b)=>b.updatedAt>a.updatedAt?1:-1);

  if(loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#FFFFFF",flexDirection:"column",gap:12}}>

    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:tk.bg,minHeight:"100vh",color:tk.text,transition:"background .2s,color .2s"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        ::-webkit-scrollbar{height:8px;width:8px;}
        ::-webkit-scrollbar-thumb{background:${tk.border};border-radius:4px;}
        .task-row:hover,.bar-row:hover{background:${tk.rowHover};}

      `}</style>

      {/* PROJECT DRAWER */}
      {showProjects&&(
        <div style={{position:"fixed",inset:0,zIndex:50,display:"flex"}}>
          <div onClick={()=>setShowProjects(false)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.3)"}}/>
          <div style={{position:"relative",width:260,background:tk.bg,borderRight:`1px solid ${tk.border}`,height:"100%",display:"flex",flexDirection:"column",zIndex:1}}>
            <div style={{padding:"16px 16px 12px",borderBottom:`1px solid ${tk.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <span style={{fontWeight:600,fontSize:14}}>專案列表</span>
              <button onClick={()=>setShowProjects(false)} style={{background:"transparent",border:"none",cursor:"pointer",color:tk.textDim,display:"flex"}}><X size={16}/></button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:8}}>
              {projectList.map(p=>(
                <div key={p.id} onClick={()=>{setActiveId(p.id);setShowProjects(false);}} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 10px",borderRadius:8,background:activeId===p.id?tk.surface:"transparent",marginBottom:3,cursor:"pointer"}}>
                  <Folder size={14} style={{color:tk.textDim,flexShrink:0}}/>
                  {renamingId===p.id?(
                    <input autoFocus value={p.name}
                      onChange={e=>setProjects(prev=>({...prev,[p.id]:{...prev[p.id],name:e.target.value}}))}
                      onBlur={()=>setRenamingId(null)} onKeyDown={e=>{if(e.key==="Enter")setRenamingId(null);}}
                      onClick={e=>e.stopPropagation()}
                      style={{flex:1,fontSize:13,border:"none",outline:"none",background:"transparent",color:tk.text,fontFamily:"inherit"}}/>
                  ):(
                    <span style={{flex:1,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:activeId===p.id?tk.text:tk.textMid}}>{p.name}</span>
                  )}
                  <button onClick={e=>{e.stopPropagation();setRenamingId(p.id);}} style={{background:"transparent",border:"none",cursor:"pointer",color:tk.textDim,display:"flex",padding:3,flexShrink:0}}><Pencil size={11}/></button>
                  {Object.keys(projects).length>1&&(
                    <button onClick={e=>{e.stopPropagation();deleteProject(p.id);}} style={{background:"transparent",border:"none",cursor:"pointer",color:tk.textDim,display:"flex",padding:3,flexShrink:0}}><Trash2 size={11}/></button>
                  )}
                </div>
              ))}
            </div>
            <div style={{padding:12,borderTop:`1px solid ${tk.border}`,flexShrink:0}}>
              <button onClick={createProject} style={{width:"100%",padding:"8px",border:`1px dashed ${tk.border}`,borderRadius:8,background:"transparent",cursor:"pointer",fontSize:13,color:tk.textMid,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <Plus size={14}/>新增專案
              </button>
            </div>
          </div>
        </div>
      )}

      {showCatModal&&<CatModal tk={tk} dark={dark} customCats={customCats} setCustomCats={setCustomCats} onClose={()=>setShowCatModal(false)}/>}

      {/* HEADER */}
      <div style={{position:"sticky",top:0,zIndex:40,background:tk.headBg,borderBottom:`1px solid ${tk.border}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",height:52,gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
            <span style={{fontWeight:700,fontSize:17,letterSpacing:"-0.4px",color:dark?"#5B82E8":"#002FA7",flexShrink:0}}>ZenFlow</span>
            <span style={{fontSize:11,fontWeight:500,color:dark?"#93B4F5":"#002FA7",background:dark?"rgba(91,130,232,0.15)":"rgba(0,47,167,0.08)",padding:"2px 8px",borderRadius:6,letterSpacing:"0.02em",flexShrink:0,fontFamily:"inherit"}}>Gantt</span>
            <span style={{width:1,height:16,background:tk.border,flexShrink:0,marginLeft:2}}/>
            <input value={projectName} onChange={e=>setProjectName(e.target.value)}
              style={{fontWeight:600,fontSize:15,background:"transparent",border:"none",outline:"none",color:tk.text,minWidth:0,maxWidth:200,fontFamily:"inherit"}}/>
            {(desDays>0||bldDays>0)&&(
              <div style={{display:"flex",gap:8,fontFamily:"'JetBrains Mono',monospace",fontSize:11,flexShrink:0}}>
                {desDays>0&&<span style={{color:"#8B5CF6"}}>設計 {desDays}d</span>}
                {bldDays>0&&<span style={{color:tk.textMid}}>施工 {bldDays}d</span>}
              </div>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            {/* 雲端儲存狀態 */}
            {saveStatus&&(
              <span style={{fontSize:11,color:saveStatus.includes("失敗")?"#EF4444":"#8B5CF6",fontFamily:"'JetBrains Mono',monospace",opacity:.8}}>{saveStatus}</span>
            )}
            <div style={{display:"flex",alignItems:"center",border:`1px solid ${tk.border}`,borderRadius:8,overflow:"hidden"}}>
              <button onClick={()=>setDayWidth(w=>Math.max(12,w-6))} style={{padding:"5px 7px",background:"transparent",border:"none",cursor:"pointer",color:tk.textMid,display:"flex"}}><Minus size={12}/></button>
              <input type="number" min={12} max={56} value={dayWidth}
                onChange={e=>{const v=parseInt(e.target.value);if(!isNaN(v))setDayWidth(Math.min(56,Math.max(12,v)));}}

              <button onClick={()=>setDayWidth(w=>Math.min(56,w+6))} style={{padding:"5px 7px",background:"transparent",border:"none",cursor:"pointer",color:tk.textMid,display:"flex"}}><Plus size={12}/></button>
            </div>
            <button onClick={()=>setShowProjects(true)} title="專案列表" style={{padding:"5px 8px",background:tk.tagBg,border:`1px solid ${tk.border}`,borderRadius:8,cursor:"pointer",color:tk.textMid,display:"flex"}}><FolderOpen size={14}/></button>
            <button onClick={()=>setShowCatModal(true)} title="管理分類" style={{padding:"5px 8px",background:tk.tagBg,border:`1px solid ${tk.border}`,borderRadius:8,cursor:"pointer",color:tk.textMid,display:"flex"}}><Settings size={14}/></button>
            <button onClick={()=>exportJPG({sorted,allCats,minD,dayWidth,projectName,dark})} title="匯出 JPG" style={{padding:"5px 8px",background:tk.tagBg,border:`1px solid ${tk.border}`,borderRadius:8,cursor:"pointer",color:tk.textMid,display:"flex"}}><Download size={14}/></button>
            <button onClick={()=>setDark(d=>!d)} style={{padding:"5px 8px",background:tk.tagBg,border:`1px solid ${tk.border}`,borderRadius:8,cursor:"pointer",color:tk.textMid,display:"flex"}}>{dark?<Sun size={14}/>:<Moon size={14}/>}</button>
            <button onClick={openNew} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:dark?"#5B82E8":"#002FA7",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>
              <Plus size={14}/>新增
            </button>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"0 16px 10px",overflowX:"auto"}}>
          {allCats.map(c=>(
            <span key={c.key} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:tk.textDim,whiteSpace:"nowrap",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>
              <span style={{width:7,height:7,borderRadius:2,background:dark?c.dark[0]:c.light[0],display:"inline-block"}}/>{c.label}
            </span>
          ))}
        </div>
      </div>

      {/* EMPTY */}
      {tasks.length===0&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"80px 24px",gap:12,textAlign:"center"}}>
          <div style={{width:44,height:44,borderRadius:10,background:tk.surface,display:"flex",alignItems:"center",justifyContent:"center"}}><FolderOpen size={20} style={{color:tk.textDim}}/></div>
          <p style={{fontWeight:600,fontSize:15}}>尚無工項</p>
          <p style={{fontSize:13,color:tk.textMid}}>點擊新增，開始排定工期</p>
          <button onClick={openNew} style={{marginTop:8,padding:"8px 20px",background:dark?"#8B5CF6":"#1A1A1A",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:500}}>新增第一個工項</button>
        </div>
      )}

      {/* MAIN */}
      {tasks.length>0&&(
        <div style={{display:"flex",height:"calc(100vh - 94px)"}}>
          <div style={{width:SIDEBAR,flexShrink:0,borderRight:`1px solid ${tk.border}`,display:"flex",flexDirection:"column"}}>
            <div style={{height:HEAD_H,display:"flex",alignItems:"flex-end",paddingBottom:10,paddingLeft:16,fontSize:11,fontWeight:500,color:tk.textDim,letterSpacing:.5,textTransform:"uppercase",borderBottom:`1px solid ${tk.border}`,background:tk.headBg,fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>工項</div>
            <div style={{overflowY:"hidden",flex:1}}>
              {sorted.map(t=>{const cat=catOf(t.category);const col=dark?cat.dark[0]:cat.light[0];const dur=diffDays(t.start,t.end)+1;return(
                <div key={t.id} className="task-row" onClick={()=>openEdit(t.id)} style={{height:ROW_H,display:"flex",alignItems:"center",gap:8,paddingLeft:14,paddingRight:8,borderBottom:`1px solid ${tk.border}`,cursor:"pointer"}}>
                  <span style={{width:3,height:20,borderRadius:2,background:col,flexShrink:0}}/>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:112}}>{t.name}</div>
                    <div className="mono" style={{fontSize:10,color:tk.textDim,marginTop:1}}>{dur}天</div>
                  </div>
                </div>
              );})}
            </div>
          </div>
          <div ref={scrollRef} style={{flex:1,overflow:"auto"}} onClick={()=>setConfirmId(null)}>
            <div style={{width:timelineWidth,height:timelineHeight,position:"relative",minHeight:"100%"}}>
              {days.map((d,i)=>{const dt=parseISO(d);if(dt.getDay()!==0&&dt.getDay()!==6)return null;return <div key={i} style={{position:"absolute",left:i*dayWidth,top:0,width:dayWidth,height:timelineHeight,background:tk.weekend,zIndex:0}}/>;  })}
              <div style={{position:"absolute",left:todayOff+dayWidth/2-.5,top:0,bottom:0,width:1,background:tk.today,zIndex:20,opacity:.65}}/>
              <div style={{position:"absolute",left:todayOff,top:HEAD_H,width:dayWidth,bottom:0,background:tk.todayBg,zIndex:0}}/>
              <div style={{position:"sticky",top:0,zIndex:30,height:HEAD_H,background:tk.headBg,borderBottom:`1px solid ${tk.border}`}}>
                <div style={{display:"flex",height:26,borderBottom:`1px solid ${tk.border}`}}>
                  {months.map((m,i)=>(
                    <div key={i} style={{width:m.count*dayWidth,borderLeft:`1px solid ${tk.border}`,paddingLeft:8,display:"flex",alignItems:"center",fontSize:11,fontWeight:600,color:tk.text,whiteSpace:"nowrap",overflow:"hidden"}}>{m.label}</div>
                  ))}
                </div>
                <div style={{display:"flex",height:34,alignItems:"center"}}>
                  {days.map((d,i)=>{const dt=parseISO(d);const isToday=d===today;const we=dt.getDay()===0||dt.getDay()===6;const show=dayWidth>=18||dt.getDate()%2===0;return <div key={i} className="mono" style={{width:dayWidth,textAlign:"center",fontSize:10,color:isToday?tk.today:(we?tk.textDim:tk.textMid),fontWeight:isToday?700:400,flexShrink:0,userSelect:"none"}}>{show?dt.getDate():""}</div>;})}
                </div>
              </div>
              {sorted.map((t,idx)=>{
                const cat=catOf(t.category);const cols=dark?cat.dark:cat.light;
                const left=diffDays(minD,t.start)*dayWidth;const w=(diffDays(t.start,t.end)+1)*dayWidth;
                const top=HEAD_H+idx*ROW_H+(ROW_H-BAR_H)/2;const prog=t.progress||0;
                const shortBar=w<measureText(t.name)+24;
                return(
                  <div key={t.id}>
                    <div className="bar-row" style={{position:"absolute",left:0,top:HEAD_H+idx*ROW_H,width:timelineWidth,height:ROW_H,borderBottom:`1px solid ${tk.border}`,zIndex:1}}/>
                    <div
                      onMouseDown={makeDrag(t,"move")}
                      style={{position:"absolute",left,top,width:w,height:BAR_H,borderRadius:BAR_H/2,background:`linear-gradient(90deg,${cols[0]},${cols[1]})`,zIndex:10,cursor:"grab",boxShadow:dark?`0 1px 8px ${cols[0]}44`:`0 1px 4px ${cols[0]}38`,display:"flex",alignItems:"center",overflow:"hidden",userSelect:"none"}}>
                      {prog>0&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:`${prog}%`,background:"rgba(255,255,255,0.25)",borderRadius:BAR_H/2}}/>}
                      {!shortBar&&<span style={{position:"relative",zIndex:1,fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.95)",paddingLeft:12,paddingRight:8,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:w-16,textShadow:"0 1px 2px rgba(0,0,0,0.2)",userSelect:"none",pointerEvents:"none"}}>{t.name}</span>}
                      <div onMouseDown={makeDrag(t,"l")} style={{position:"absolute",left:0,top:0,bottom:0,width:12,cursor:"ew-resize",zIndex:2}}/>
                      <div onMouseDown={makeDrag(t,"r")} style={{position:"absolute",right:0,top:0,bottom:0,width:12,cursor:"ew-resize",zIndex:2}}/>
                    </div>
                    {shortBar&&(
                      <div style={{position:"absolute",left:left+w+6,top,height:BAR_H,display:"flex",alignItems:"center",zIndex:8,pointerEvents:"none"}}>
                        <span style={{fontSize:11,fontWeight:500,color:tk.text,whiteSpace:"nowrap",userSelect:"none",opacity:.85}}>{t.name}</span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {showForm&&<TaskForm initial={editingTaskId==="new"?null:tasks.find(t=>t.id===editingTaskId)} defaultStart={nextStart} dark={dark} tk={tk} allCats={allCats} onClose={closeForm} onSave={saveTask} onDelete={editingTaskId!=="new"?()=>setConfirmId(editingTaskId):null}/>}
      {confirmId&&(
        <div onClick={()=>setConfirmId(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60,padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:tk.bg,border:`1px solid ${tk.border}`,borderRadius:12,padding:20,maxWidth:300,width:"100%"}}>
            <p style={{fontSize:14,marginBottom:16}}>確定刪除「{tasks.find(t=>t.id===confirmId)?.name}」嗎？</p>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
              <button onClick={()=>setConfirmId(null)} style={{padding:"6px 14px",border:`1px solid ${tk.border}`,borderRadius:8,background:"transparent",cursor:"pointer",fontSize:13,color:tk.text}}>取消</button>
              <button onClick={()=>deleteTask(confirmId)} style={{padding:"6px 14px",border:"none",borderRadius:8,background:"#EF4444",color:"#fff",cursor:"pointer",fontSize:13}}>刪除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CatModal ──────────────────────────────────────────────────────────────────
function CatModal({tk,dark,customCats,setCustomCats,onClose}){
  const [label,setLabel]=useState("");
  const [pickedColor,setPickedColor]=useState("#3B82F6");
  const [err,setErr]=useState(false);
  const lightCol=[pickedColor,lightenHex(pickedColor)];
  const add=()=>{if(!label.trim()){setErr(true);return;}setCustomCats(c=>[...c,{key:"custom_"+uid(),label:label.trim(),light:lightCol,dark:lightCol}]);setLabel("");setErr(false);};
  const pill={display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,border:`1px solid ${tk.border}`,fontSize:12,color:tk.textMid};
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:55,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:tk.bg,border:`1px solid ${tk.border}`,borderRadius:14,padding:20,maxWidth:380,width:"100%",maxHeight:"82vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <span style={{fontWeight:600,fontSize:15}}>管理分類</span>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",color:tk.textDim,display:"flex"}}><X size={18}/></button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:18}}>
          {DEFAULT_CATS.map(c=>(
            <span key={c.key} style={pill}>
              <span style={{width:7,height:7,borderRadius:2,background:dark?c.dark[0]:c.light[0],display:"inline-block",flexShrink:0}}/>{c.label}
            </span>
          ))}
          {customCats.map(c=>(
            <span key={c.key} style={{...pill,paddingRight:4}}>
              <span style={{width:7,height:7,borderRadius:2,background:c.light[0],display:"inline-block",flexShrink:0}}/>{c.label}
              <button onClick={()=>setCustomCats(cs=>cs.filter(x=>x.key!==c.key))}
                style={{background:"transparent",border:"none",cursor:"pointer",color:tk.textDim,display:"flex",alignItems:"center",padding:"0 2px",marginLeft:2,fontSize:14,lineHeight:1}}>×</button>
            </span>
          ))}
        </div>
        <div style={{borderTop:`1px solid ${tk.border}`,paddingTop:14}}>
          <p style={{fontSize:11,color:tk.textDim,fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>新增自訂分類</p>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input value={label} onChange={e=>{setLabel(e.target.value);setErr(false);}} placeholder="分類名稱"
              style={{flex:1,padding:"8px 12px",border:`1px solid ${err?"#EF4444":tk.border}`,borderRadius:8,fontSize:13,background:tk.surface,color:tk.text,outline:"none",fontFamily:"inherit"}}/>
            <input type="color" value={pickedColor} onChange={e=>setPickedColor(e.target.value)}
              style={{width:40,height:38,borderRadius:8,border:`1px solid ${tk.border}`,cursor:"pointer",padding:2,background:"transparent"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>
            <span style={pill}>
              <span style={{width:7,height:7,borderRadius:2,background:pickedColor,display:"inline-block"}}/>{label||"名稱預覽"}
            </span>
            <span style={{fontSize:11,color:tk.textDim}}>← 預覽</span>
          </div>
          <button onClick={add} style={{width:"100%",padding:"9px",background:dark?"#5B82E8":"#002FA7",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Plus size={14}/>新增分類</button>
        </div>
      </div>
    </div>
  );
}

// ── TaskForm ──────────────────────────────────────────────────────────────────
function TaskForm({initial,defaultStart,dark,tk,allCats,onClose,onSave,onDelete}){
  const [name,setName]=useState(initial?.name||"");
  const [category,setCategory]=useState(initial?.category||allCats[0]?.key||"other");
  const [start,setStart]=useState(initial?.start||defaultStart||todayISO());
  const [end,setEnd]=useState(initial?.end||addDays(initial?.start||defaultStart||todayISO(),2));
  const [progress,setProgress]=useState(initial?.progress||0);
  const [err,setErr]=useState(false);
  const dur=Math.max(1,diffDays(start,end)+1);
  const setDur=d=>setEnd(addDays(start,Math.max(1,d)-1));
  const doSave=()=>{if(!name.trim()){setErr(true);return;}let s=start,e=end;if(diffDays(s,e)<0)e=s;onSave({name:name.trim(),category,start:s,end:e,progress:Number(progress)});};
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:50}}>
      <div onClick={e=>e.stopPropagation()} style={{background:tk.bg,width:"100%",maxWidth:460,borderRadius:"16px 16px 0 0",padding:20,maxHeight:"90vh",overflowY:"auto",border:`1px solid ${tk.border}`,borderBottom:"none",fontFamily:"inherit"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
          <span style={{fontWeight:600,fontSize:15}}>{initial?"編輯工項":"新增工項"}</span>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",color:tk.textDim,display:"flex"}}><X size={18}/></button>
        </div>
        <label style={{display:"block",fontSize:11,color:tk.textDim,marginBottom:5,fontFamily:"'JetBrains Mono',monospace"}}>工項名稱</label>
        <input value={name} onChange={e=>{setName(e.target.value);if(e.target.value.trim())setErr(false);}} placeholder="例如：客廳泥作"
          style={{width:"100%",padding:"9px 12px",border:`1px solid ${err?"#EF4444":tk.border}`,borderRadius:8,fontSize:14,background:tk.surface,color:tk.text,outline:"none",marginBottom:err?4:14,fontFamily:"inherit"}}/>
        {err&&<p style={{color:"#EF4444",fontSize:11,marginBottom:12}}>請填寫工項名稱</p>}
        <label style={{display:"block",fontSize:11,color:tk.textDim,marginBottom:8,fontFamily:"'JetBrains Mono',monospace"}}>分類</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>{allCats.map(c=>{const col=dark?c.dark[0]:c.light[0];const sel=category===c.key;return(
          <button type="button" key={c.key} onClick={()=>setCategory(c.key)}
            style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:sel?600:400,border:`1px solid ${sel?col:tk.border}`,background:sel?col+"18":"transparent",color:sel?col:tk.textMid}}>
            <span style={{width:7,height:7,borderRadius:2,background:col,display:"inline-block"}}/>{c.label}
          </button>);
        })}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div><label style={{display:"block",fontSize:11,color:tk.textDim,marginBottom:5,fontFamily:"'JetBrains Mono',monospace"}}>開始</label><input type="date" value={start} onChange={e=>setStart(e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1px solid ${tk.border}`,borderRadius:8,fontSize:13,background:tk.surface,color:tk.text,outline:"none",fontFamily:"'JetBrains Mono',monospace"}}/></div>
          <div><label style={{display:"block",fontSize:11,color:tk.textDim,marginBottom:5,fontFamily:"'JetBrains Mono',monospace"}}>結束</label><input type="date" value={end} onChange={e=>setEnd(e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1px solid ${tk.border}`,borderRadius:8,fontSize:13,background:tk.surface,color:tk.text,outline:"none",fontFamily:"'JetBrains Mono',monospace"}}/></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <span style={{fontSize:11,color:tk.textDim,fontFamily:"'JetBrains Mono',monospace"}}>工期</span>
          <button onClick={()=>setDur(dur-1)} style={{width:28,height:28,border:`1px solid ${tk.border}`,borderRadius:7,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:tk.textMid}}><Minus size={12}/></button>
          <input type="number" min={1} value={dur}
            onChange={e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v>=1)setDur(v);}}
            style={{width:52,textAlign:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:tk.text,background:tk.surface,border:`1px solid ${tk.border}`,borderRadius:7,padding:"5px 0",outline:"none"}}/>
          <span style={{fontSize:11,color:tk.textDim,fontFamily:"'JetBrains Mono',monospace"}}>天</span>
          <button onClick={()=>setDur(dur+1)} style={{width:28,height:28,border:`1px solid ${tk.border}`,borderRadius:7,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:tk.textMid}}><Plus size={12}/></button>
        </div>
        <label style={{display:"block",fontSize:11,color:tk.textDim,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>完成度 {progress}%</label>
        <input type="range" min={0} max={100} step={5} value={progress} onChange={e=>setProgress(e.target.value)} style={{width:"100%",marginBottom:20}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          {onDelete?<button onClick={onDelete} style={{display:"flex",alignItems:"center",gap:5,fontSize:13,color:"#EF4444",background:"transparent",border:"none",cursor:"pointer"}}><Trash2 size={14}/>刪除</button>:<span/>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{padding:"7px 16px",border:`1px solid ${tk.border}`,borderRadius:8,background:"transparent",cursor:"pointer",fontSize:13,color:tk.text}}>取消</button>
            <button onClick={doSave} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 16px",border:"none",borderRadius:8,background:dark?"#8B5CF6":"#1A1A1A",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}><Check size={14}/>儲存</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GanttPlanner/>);
</script>
</body>
</html>
